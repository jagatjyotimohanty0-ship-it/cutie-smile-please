<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning Baby ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ecf,#9fdcff);
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:40px 20px;
overflow-y:auto;
overflow-x:hidden;
}

.container{
width:100%;
max-width:700px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
margin-bottom:20px;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4f9b;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>🌞 Good Morning Baby ❤️</h1>

<p>
Today's mission is simple...<br><br>
Make Snoor Smile 😊
</p>

<button id="startBtn">
▶️ START SCAN
</button>

</div>
<script>

document.getElementById("startBtn").onclick=function(){

document.querySelector(".container").innerHTML=`

<h1>🤖 Smile Scanner</h1>

<div id="scan" style="text-align:left;white-space:pre-line;font-size:18px;line-height:1.8;"></div>

`;

const scan=document.getElementById("scan");

const lines=[
"Smile Scanner Starting...\n",
"",
"█░░░░░░░░░ 10%",
"Tumhari profile search ho rahi hai... 👀\n",
"",
"████░░░░░░ 40%",
"Secret information collect ho rahi hai... 🤫\n",
"",
"███████░░░ 70%",
"Heart connection verify ho raha hai... ❤️\n",
"",
"██████████ 100%",
"Scan Complete! ✅"
];

let i=0;

function typing(){

if(i<lines.length){

scan.innerHTML+=lines[i]+"<br>";

i++;

setTimeout(typing,700);

}

}

typing();
setTimeout(function(){

document.querySelector(".container").innerHTML=`

<h1>📋 FINAL REPORT</h1>

<div style="text-align:left;line-height:2;font-size:18px;">

👤 <b>Name:</b> Snoor ❤️<br><br>

🌸 <b>Status:</b> Meri Sabse Favorite Person<br><br>

✨ <b>Cuteness Level:</b> Infinite ♾️<br><br>

🤍 <b>Kindness Level:</b> 100/100<br><br>

😊 <b>Smile Power:</b><br>
Ek smile se mera pura din ban jata hai.<br><br>

💖 <b>Special Talent:</b><br>
Bina permission mera dil chura lena. 😤❤️

</div>

`;

},10000);
setTimeout(function(){

document.querySelector(".container").innerHTML=`

<h1>🚔 LOVE POLICE DATABASE</h1>

<div style="text-align:left;line-height:2;font-size:18px;">

❤️ <b>Crime Detected:</b> Dil Chori<br><br>

👤 <b>Prime Suspect:</b> Snoor 🤭<br><br>

🥺 <b>Victim:</b> Jagat<br><br>

📄 <b>Evidence:</b><br>

• Cute Smile 😊<br>
• Innocent Face 🥺<br>
• Beautiful Eyes ✨<br><br>

⚖️ <b>Punishment:</b><br>

❤️ Lifetime mere saath rehna.<br><br>

🚫 No Bail.<br>
🚫 No Escape.<br>

🤍 Only Love.

</div>

`;

},18000);
setTimeout(function(){

document.querySelector(".container").innerHTML=`

<h1>❤️ EXTRA FINDINGS</h1>

<div style="text-align:left;line-height:2;font-size:18px;">

❤️ <b>Heartbeat:</b> Fast<br>
Reason: Snoor detected. 🤭<br><br>

🏡 <b>Safe Place Found:</b><br>
→ Mere dil mein. 🤍<br><br>

💌 <b>Secret Note:</b><br><br>

Pata hai...<br><br>

Kabhi kabhi lagta hai,<br>
meri life ki sabse achhi notification tum thi.<br><br>

Aur aaj bhi...<br><br>

meri favourite person...<br>
meri favourite smile...<br>
meri favourite feeling...<br><br>

<b>Sirf tum ho. ❤️</b>
<br><br>

<button onclick="nextPage()">
🤭 One Last Check
</button>
</div>

`;

},26000);
}
function nextPage(){

document.querySelector(".container").innerHTML=`

<h1>😂 FINAL CHECK</h1>

<div style="text-align:left;line-height:2;font-size:18px;">

Checking...

Kya Snoor duniya ki
sabse pyari ladki hai?

<br><br>

✅ YES

<br>

✅ YES

<br>

✅ YES

<br><br>

Searching another answer...

<br><br>

❌ Error!

Aur koi option hi nahi mila. 😂❤️

</div>

`;

}
</script>
</body>
</html>
